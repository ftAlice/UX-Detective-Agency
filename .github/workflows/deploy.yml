name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # 每次推送到 main 分支時自動觸發部署
  workflow_dispatch:  # 也允許在 GitHub 介面手動觸發

# 設定 GITHUB_TOKEN 權限，允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 確保同一時間只有一個部署任務在執行
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 強制使用 Node.js 24 執行 Actions，避免 Node 20 棄用警告

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static files to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # 將整個 repo 根目錄作為靜態網站上傳
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
