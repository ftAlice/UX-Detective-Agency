<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Detective Agency — SURVEILLANCE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&family=Teko:wght@600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0C10;
  --dark:#1A1C23;
  --gray:#8A8D98;
  --white:#F8F9FA;
  --red:#FF2A42;
  --red-dim:rgba(255,42,66,0.2);
  --scan:rgba(255,42,66,0.05);
  --font-mech:'Rajdhani', sans-serif;
  --font-data:'Share Tech Mono', monospace;
  --font-display:'Teko', sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;cursor:none;font-family:var(--font-mech);color:var(--white);}

/* ── CYBER DOT GRID ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(var(--gray) 1.5px,transparent 1.5px);
  background-size:24px 24px;opacity:0.25;
}

/* ── SCANLINES ── */
body::after{
  content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:repeating-linear-gradient(0deg,var(--scan) 0px,var(--scan) 2px,transparent 2px,transparent 4px);
  opacity:0.6;
}

/* ── MASSIVE BG TEXT ── */
.bg-text{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--font-display);font-size:28vw;line-height:0.8;
  color:var(--white);white-space:nowrap;z-index:1;
  font-weight:600;letter-spacing:0.02em;user-select:none;
  opacity:0.8;
}
.bg-text::before{
  content:attr(data-text);position:absolute;left:-10px;top:0;
  color:var(--red);z-index:-1;opacity:0.9;
}
.bg-text::after{
  content:attr(data-text);position:absolute;left:5px;top:5px;
  color:rgba(255,255,255,0.1);z-index:-2;
}
.bg-sub{
  position:absolute;bottom:-2vw;right:10vw;
  font-family:var(--font-mech);font-size:1.5vw;letter-spacing:0.5em;
  color:var(--gray);text-transform:uppercase;
}

/* ── HUD OVERLAYS ── */
.hud-nav{
  position:fixed;top:0;left:0;width:100%;padding:24px 40px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:100;pointer-events:none;
}
.logo{
  font-size:28px;font-weight:700;letter-spacing:2px;display:flex;align-items:center;gap:12px;
}
.logo::before{
  content:'';display:inline-block;width:32px;height:24px;
  background:var(--red);
  clip-path:polygon(0 0, 70% 0, 100% 30%, 100% 100%, 30% 100%, 0 70%);
}
.nav-links{
  display:flex;gap:40px;margin-left:80px;font-size:16px;letter-spacing:2px;font-weight:700;
}
.nav-links span{color:var(--white);position:relative;}
.nav-links span.active{color:var(--red);}
.nav-links span.active::after{
  content:'';position:absolute;bottom:-6px;left:0;width:100%;height:2px;background:var(--red);
}

.btn-cyber{
  background:transparent;color:var(--white);border:2px solid var(--red);
  padding:8px 32px;font-family:var(--font-mech);font-weight:700;font-size:18px;letter-spacing:2px;
  position:relative;pointer-events:auto;cursor:none;
  background:var(--red-dim);
  clip-path:polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.btn-cyber::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:4px;background:var(--white);
}
.btn-cyber::after{
  content:'';position:absolute;bottom:0;right:0;width:4px;height:4px;background:var(--white);
}
.btn-cyber-solid{
  background:var(--red);color:var(--white);border:none;
}

/* Bottom HUD */
.hud-bottom-left{
  position:fixed;bottom:40px;left:40px;z-index:100;
  width:320px;padding:24px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(11,12,16,0.85);backdrop-filter:blur(4px);
  clip-path:polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
  border-left:4px solid var(--red);
}
.hud-title{color:var(--red);font-size:22px;font-weight:700;letter-spacing:2px;margin-bottom:12px;}
.hud-desc{font-family:var(--font-data);color:var(--gray);font-size:12px;line-height:1.6;margin-bottom:20px;}
.hud-link{color:var(--red);font-family:var(--font-data);font-size:12px;text-align:right;text-transform:uppercase;letter-spacing:1px;}

.hud-bottom-right{
  position:fixed;bottom:40px;right:40px;z-index:100;
  display:flex;flex-direction:column;align-items:flex-end;gap:16px;
}
.clock-display{
  font-family:var(--font-display);font-size:48px;line-height:1;color:var(--white);
  text-shadow:2px 2px 0 var(--red);letter-spacing:2px;
}
.clock-display span{color:var(--red);text-shadow:none;}
.date-display{
  font-family:var(--font-data);font-size:14px;color:var(--gray);letter-spacing:3px;
}

/* CROSSHAIRS */
.crosshair{position:fixed;width:20px;height:20px;pointer-events:none;z-index:90;}
.crosshair::before{content:'';position:absolute;top:50%;left:0;width:100%;height:1px;background:rgba(255,255,255,0.3);}
.crosshair::after{content:'';position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(255,255,255,0.3);}
.ch-tl{top:120px;left:40px;}.ch-tr{top:120px;right:40px;}
.ch-bl{bottom:220px;left:40px;}.ch-br{bottom:220px;right:40px;}

/* ── SCENE ── */
.scene{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:10;pointer-events:none;
  perspective:1500px; /* Add 3D perspective */
}

/* ── MECHA CCTV ── */
.cctv-wrapper{
  position:absolute;top:50%;left:50%;
  transform-style:preserve-3d;
  transform:translate(-50%,-100px);
  z-index:20;
  filter:drop-shadow(0 40px 80px rgba(0,0,0,0.8));
}

.mount-arm{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-170px);
  width:16px;height:70px;
  background:linear-gradient(90deg,#2A2D34,#1A1C23,#2A2D34);
  clip-path:polygon(20% 0, 80% 0, 100% 100%, 0 100%);
  border-bottom:2px solid var(--red);
}

.camera-body{
  position:relative;
  width:240px;height:90px;
  background:#EAECEF; /* Tech white */
  clip-path:polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
  border:2px solid #FFFFFF;
  box-shadow:inset -10px -10px 20px rgba(0,0,0,0.15), inset 2px 2px 10px rgba(255,255,255,1);
  transform-style:preserve-3d;
}
/* Fake 3D thickness block */
.camera-body::before{
  content:'';position:absolute;inset:0;background:#1A1C23;
  clip-path:polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
  transform:translateZ(-20px);z-index:-1;
}

/* Dark lower panel */
.body-lower{
  position:absolute;bottom:0;left:0;width:100%;height:35px;
  background:#1A1C23;
  clip-path:polygon(0 0, 100% 0, 100% 100%, 0 100%);
  transform:translateZ(2px);
}

/* Red accent lines */
.accent-line{
  position:absolute;background:var(--red);
  transform:skewX(-45deg) translateZ(4px);
}
.al-1{top:12px;left:30px;width:60px;height:4px;}
.al-2{top:12px;left:100px;width:12px;height:4px;}

/* Tech decals */
.decal-main{
  position:absolute;top:30px;right:20px;
  font-family:var(--font-data);font-size:10px;color:var(--gray);
  text-align:right;line-height:1.2;
}
.decal-main strong{color:var(--dark);font-size:14px;letter-spacing:1px;}
.warning-box{
  position:absolute;bottom:8px;right:20px;
  background:var(--red);color:var(--white);
  font-family:var(--font-data);font-size:8px;padding:2px 6px;
  letter-spacing:1px;font-weight:700;
}

/* ── LENS HOUSING ── */
.lens-housing{
  position:absolute;left:-40px;top:50%;
  width:110px;height:110px;
  transform:translateY(-50%) translateZ(40px);
  transform-style:preserve-3d;
}
.lens-rim{
  position:absolute;inset:0;border-radius:50%;
  background:#1A1C23;
  border:4px solid #EAECEF;
  box-shadow:0 15px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.9);
  transform-style:preserve-3d;
}
/* Fake cylinder depth */
.lens-rim::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:#2A2D34;transform:translateZ(-15px);z-index:-1;
}

/* Angular cutouts on rim */
.lens-rim::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:2px dashed var(--red);opacity:0.5;
  animation:spin 20s linear infinite;
  transform:translateZ(5px);
}
@keyframes spin{100%{transform:rotate(360deg)}}

.lens-glass{
  position:absolute;inset:10px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #2A2D34, #0B0C10 70%);
  box-shadow:inset 0 4px 10px rgba(0,0,0,0.8);
  overflow:hidden;
  transform:translateZ(10px);
  transform-style:preserve-3d;
}

.lens-iris{
  position:absolute;top:50%;left:50%;
  width:60px;height:60px;
  border-radius:50%;
  background:#050505;
  border:2px solid #2A2D34;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s cubic-bezier(0.2,0,0,1);
  transform:translate(-50%,-50%) translateZ(10px);
  transform-style:preserve-3d;
}

/* Cyber red glowing pupil */
.lens-pupil{
  width:24px;height:24px;border-radius:50%;
  background:var(--red);
  box-shadow:0 0 15px var(--red), 0 0 30px var(--red), inset 0 0 8px rgba(255,255,255,0.8);
  position:relative;
  transform:translateZ(5px);
}
.lens-pupil::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:8px;height:8px;border-radius:50%;background:#FFF;
}

/* Glass reflection */
.spec{
  position:absolute;border-radius:50%;pointer-events:none;
}
.spec1{
  top:15%;left:20%;width:30px;height:15px;
  background:linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 100%);
  transform:rotate(-30deg);
}

/* Target acquired ring */
.target-ring{
  position:absolute;inset:2px;border-radius:50%;
  border:2px solid var(--red);
  border-left-color:transparent;border-right-color:transparent;
  opacity:0;transition:all 0.3s ease;
}
.lens-glass.hovered .target-ring{
  opacity:1;transform:scale(1.1);animation:spin 2s linear infinite;
}
.lens-glass.hovered .lens-pupil{
  transform:scale(1.2);box-shadow:0 0 25px var(--red), 0 0 50px var(--red), inset 0 0 10px #fff;
}

/* ── CUSTOM CURSOR ── */
.cur{
  position:fixed;width:24px;height:24px;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:width 0.1s, height 0.1s;
}
.cur::before{
  content:'';position:absolute;top:0;left:0;width:8px;height:8px;
  border-top:2px solid var(--red);border-left:2px solid var(--red);
}
.cur::after{
  content:'';position:absolute;bottom:0;right:0;width:8px;height:8px;
  border-bottom:2px solid var(--red);border-right:2px solid var(--red);
}
.cur-dot{
  position:fixed;width:4px;height:4px;
  background:var(--white);
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
}

/* ── ALERT OVERLAY ── */
.alert-text{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--font-display);font-size:120px;color:var(--red);
  opacity:0;pointer-events:none;z-index:500;
  text-shadow:4px 4px 0 rgba(0,0,0,0.5);
  transition:opacity 0.2s, transform 0.2s;
  letter-spacing:5px;
}
.alert-text.on{
  opacity:0.8;transform:translate(-50%,-50%) scale(1.05);
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-text" data-text="サ－ベイランス">サ－ベイランス<div class="bg-sub">SYSTEM_ACTIVE // 04</div></div>

<!-- Crosshairs -->
<div class="crosshair ch-tl"></div>
<div class="crosshair ch-tr"></div>
<div class="crosshair ch-bl"></div>
<div class="crosshair ch-br"></div>

<!-- Custom Cursor -->
<div class="cur" id="cur"></div>
<div class="cur-dot" id="dot"></div>

<!-- Top HUD -->
<nav class="hud-nav">
  <div style="display:flex;align-items:center;">
    <div class="logo">UK</div>
    <div class="nav-links">
      <span class="active">HOME</span>
      <span>NEWS</span>
      <span>EXPLORE</span>
      <span>ABOUT</span>
    </div>
  </div>
  <button class="btn-cyber">[ SIGN_IN ]</button>
</nav>

<!-- Bottom HUD -->
<div class="hud-bottom-left">
  <div class="hud-title">JOIN_THE_BETA</div>
  <div class="hud-desc">Try new features before we're officially released. System surveillance protocols are currently in open beta testing phase.</div>
  <div class="hud-link">Learn more</div>
</div>

<div class="hud-bottom-right">
  <div class="clock-display" id="htime">23:12:<span>52</span></div>
  <div class="date-display" id="hdate">28_10_2024</div>
  <button class="btn-cyber btn-cyber-solid">[ JOIN_THE_BETA ]</button>
</div>

<!-- Alert -->
<div class="alert-text" id="alt">TARGET_LOCKED</div>

<!-- Main Scene -->
<div class="scene">
  <div class="cctv-wrapper" id="wrap">
    <div class="mount-arm"></div>
    <div class="camera-body">
      <div class="body-lower"></div>
      <div class="accent-line al-1"></div>
      <div class="accent-line al-2"></div>
      
      <div class="decal-main">
        <strong>SRV-04</strong><br>
        OPTICAL SENSOR<br>
        v.2.0.4.beta
      </div>
      <div class="warning-box">REC</div>

      <div class="lens-housing">
        <div class="lens-rim">
          <div class="lens-glass" id="glass">
            <div class="target-ring"></div>
            <div class="lens-iris" id="iris">
              <div class="lens-pupil"></div>
            </div>
            <div class="spec spec1"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(()=>{
const glass=document.getElementById('glass');
const iris=document.getElementById('iris');
const alt=document.getElementById('alt');
const cur=document.getElementById('cur');
const dot=document.getElementById('dot');
const wrap=document.getElementById('wrap');
const htime=document.getElementById('htime');
const hdate=document.getElementById('hdate');

let mx=innerWidth/2,my=innerHeight/2;
let rx=0,ry=0,trx=0,try_=0;
let hov=false;

// Clock & Date
function updateTime(){
  const n=new Date(),p=v=>String(v).padStart(2,'0');
  htime.innerHTML=`${p(n.getHours())}:${p(n.getMinutes())}:<span>${p(n.getSeconds())}</span>`;
  hdate.textContent=`${p(n.getDate())}_${p(n.getMonth()+1)}_${n.getFullYear()}`;
}
setInterval(updateTime,1000);updateTime();

// Mouse Tracking
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';cur.style.top=my+'px';
  dot.style.left=mx+'px';dot.style.top=my+'px';
});

// Hover Effect
glass.addEventListener('mouseenter',()=>{
  hov=true;glass.classList.add('hovered');alt.classList.add('on');
  cur.style.width='40px';cur.style.height='40px';
});
glass.addEventListener('mouseleave',()=>{
  hov=false;glass.classList.remove('hovered');alt.classList.remove('on');
  cur.style.width='24px';cur.style.height='24px';
});

// Animation Loop
function tick(){
  const nx=(mx/innerWidth-0.5)*2,ny=(my/innerHeight-0.5)*2;
  // Increase angle max to 70 degrees for extreme 3D rotation
  const maxR=hov?75:65;
  trx=-ny*maxR;try_=nx*maxR;
  
  // Cyberpunk motion: Snappier, less organic delay
  const ease=hov?0.15:0.08;
  rx+=(trx-rx)*ease;ry+=(try_-ry)*ease;

  // Wrapper 3D rotation + MASSIVE SCALE (scale 2.5x to fill screen)
  wrap.style.transform=`translate(-50%,-50%) scale(2.8) rotateX(${rx*0.6}deg) rotateY(${ry}deg)`;

  // Iris internal translation (parallax deeper in Z space)
  const ipx=(ry/12)*5,ipy=(-rx/12)*5;
  iris.style.transform=`translate(calc(-50% + ${ipx}px),calc(-50% + ${ipy}px)) translateZ(15px)`;

  requestAnimationFrame(tick);
}
tick();

// Cyber Glitch Jitter
function mechJitter(){
  if(Math.random()>0.7){
    const jx=(Math.random()-0.5)*8;
    wrap.style.transform=`translate(calc(-50% + ${jx}px),-50%) scale(2.8) rotateX(${rx*0.6}deg) rotateY(${ry}deg)`;
    setTimeout(()=>{
      wrap.style.transform=`translate(-50%,-50%) scale(2.8) rotateX(${rx*0.6}deg) rotateY(${ry}deg)`;
    }, 40);
  }
  setTimeout(mechJitter, 800+Math.random()*2000);
}
mechJitter();

})();
</script>
</body>
</html>
